# ---------- frontend/nginx.conf ----------
# ეს ფაილი container-ში ხდება /etc/nginx/conf.d/default.conf

server {
    listen 80;
    server_name _;

    # static assets
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — ყველა unknown route index.html-ზე
    location / {
        try_files $uri $uri/ /index.html;
    }

    # reverse proxy ყველა API მოთხოვნისთვის backend container-ზე
    # Docker-ის internal DNS-ში backend container სახელად "backend" გვხვდება
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # upload ზომა — Excel import-ებისთვის (default 1M ცოტაა)
    client_max_body_size 25M;

    # static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # საწყისი basic security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
