# ---------- docker-compose.yml ----------
# ეს არის BASE კონფიგი (production default: host port 8090)
# dev გარემო override-ავს port-ს docker-compose.override.yml-ით (8091)

services:
  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-scanmate}_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # პორტი არ expose-ავს host-ზე — მხოლოდ Docker network-ში
    networks:
      - scanmate_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-scanmate}_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: Scanmate Backend
      APP_ENV: ${APP_ENV:-production}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      CORS_ORIGINS: ${CORS_ORIGINS}
    networks:
      - scanmate_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: ${COMPOSE_PROJECT_NAME:-scanmate}_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HOST_PORT:-8090}:80"
    networks:
      - scanmate_net

networks:
  scanmate_net:
    driver: bridge

volumes:
  db_data:
